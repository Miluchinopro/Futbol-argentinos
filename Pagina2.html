<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Fútbol Argentino</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(lightblue, white);
    text-align: center;
}

/* Fade in */
@keyframes fade {
    from {opacity: 0;}
    to {opacity: 1;}
}

h1 {
    animation: fade 1.5s ease;
}

p {
    font-weight: bold;
    animation: fade 2s ease;
}

/* Botón animado */
.boton {
    display: inline-block;
    padding: 10px 20px;
    background: black;
    color: white;
    border-radius: 10px;
    text-decoration: none;
    transition: 0.3s;
}

.boton:hover {
    background: green;
    transform: scale(1.1);
}
</style>

</head>

<body>

<h1>Fútbol Argentino 🇦🇷⚽</h1>

<p>
Uno de los más importantes del mundo, con clubes históricos y pasión única.
</p>

<p>
Grandes equipos y jugadores hicieron historia en torneos internacionales.
</p>

<br>

<a href="index.html" class="boton">Volver</a>

</body>
</html>
